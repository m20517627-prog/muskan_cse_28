<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel or Consonant Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
    margin-top: 100px;
}

.container {
    background: white;
    width: 350px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input {
    padding: 10px;
    width: 80%;
    margin-bottom: 10px;
}

button {
    padding: 10px 20px;
    cursor: pointer;
}

#result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
    </style>

    <div class="container">
        <h2>Vowel or Consonant Checker</h2>

        <input type="text" id="charInput" maxlength="1" placeholder="Enter a letter">

        <button onclick="checkCharacter()">Check</button>

        <p id="result"></p>
    </div>

    <script src="practical.js"></script>
</body>
</html>
